<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-user-select: none; user-select: none; }
  .card {
    width: 100%; height: 100%;
    background: #101012;
    border-radius: 16px; border: 1px solid rgba(255,255,255,.06);
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; position: relative; overflow: hidden;
  }
  .badge {
    width: 60px; height: 60px; border-radius: 15px;
    background: linear-gradient(180deg, #ff7a2f, #ff3d00);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 22px rgba(255,72,0,.32);
  }
  .badge svg { width: 38px; height: 38px; display: block; }
  .name { font-size: 18px; font-weight: 600; color: #f2f2f3; letter-spacing: .2px; }
  .name b { font-weight: 700; }
  .track { width: 168px; height: 3px; border-radius: 3px; background: #232326; overflow: hidden; position: relative; margin-top: 2px; }
  .track i { position: absolute; top: 0; left: 0; height: 100%; width: 40%; border-radius: 3px;
    background: linear-gradient(90deg, #ff7a2f, #ff3d00);
    animation: slide 1.15s cubic-bezier(.5,.05,.3,1) infinite; }
  @keyframes slide { 0% { left: -42%; } 100% { left: 102%; } }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
        <g fill="#fff">
          <rect x="74" y="150" width="112" height="34" rx="17"/>
          <circle cx="86" cy="152" r="30"/>
          <circle cx="120" cy="132" r="50"/>
          <circle cx="160" cy="140" r="44"/>
          <circle cx="186" cy="156" r="28"/>
        </g>
      </svg>
    </div>
    <div class="name">Sound<b>Cloud</b></div>
    <div class="track"><i></i></div>
  </div>
</body>
</html>
